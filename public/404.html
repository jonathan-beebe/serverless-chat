<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>P2P Chat</title>
    <script>
      // ARCH-001: GitHub Pages serves 404.html for any unknown path. Stash the
      // full original URL (pathname + search + hash) before bouncing to /, so
      // main.tsx can restore it via history.replaceState() — the SPA router
      // then sees the path the user actually requested. The hash continues to
      // survive (privacy: `#offer=...` signaling payloads never leave the
      // browser even through this round-trip).
      sessionStorage.setItem('__spa_redirect', location.href)
      location.replace('/')
    </script>
  </head>
  <body></body>
</html>
